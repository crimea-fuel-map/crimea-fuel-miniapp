
<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f5f7f9">
  <title>Выбор геопозиции</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="./vendor/leaflet.css?v=20260622-2">
  <link rel="stylesheet" href="./styles.css?v=20260720-ios5">
</head>
<body>
  <main class="app-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">РАДИУС ПОИСКА 11 КМ</p>
        <h1>Выберите точку</h1>
      </div>
      <button class="icon-button" id="locateButton" type="button" title="Моё местоположение" aria-label="Моё местоположение">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M12 2v3M12 19v3M2 12h3M19 12h3"></path>
          <circle cx="12" cy="12" r="8"></circle>
        </svg>
      </button>
    </header>

    <section class="search-row" aria-label="Поиск места">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <circle cx="11" cy="11" r="7"></circle>
        <path d="m20 20-4-4"></path>
      </svg>
      <input id="searchInput" type="search" placeholder="Город, улица или место" autocomplete="off">
      <button id="clearSearch" class="clear-button" type="button" aria-label="Очистить поиск">×</button>
    </section>

    <section class="map-wrap">
      <div id="map" aria-label="Интерактивная карта Крыма"></div>
      <div class="map-tip" id="mapTip">Нажмите на карту или перетащите метку</div>
      <button class="map-retry" id="mapRetry" type="button" hidden>
        Карта не загрузилась. Повторить
      </button>
      <div class="search-results" id="searchResults" hidden></div>
    </section>

    <footer class="actionbar">
      <div class="coordinates">
        <span class="status-dot"></span>
        <div>
          <strong id="placeLabel">Симферополь</strong>
          <span id="coordinatesLabel">44.952100, 34.102400</span>
        </div>
      </div>
      <button id="confirmButton" class="confirm-button" type="button">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M20 10c0 5-8 12-8 12S4 15 4 10a8 8 0 1 1 16 0Z"></path>
          <circle cx="12" cy="10" r="2.5"></circle>
        </svg>
        Выбрать точку
      </button>
    </footer>
  </main>

  <script src="./vendor/leaflet.js?v=20260718-ios3"></script>
  <script src="./app.js?v=20260720-ios5"></script>
</body>
</html>
